<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFix AI - Auditoría Remota</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/711/711284.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/711/711284.png">
    
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .chat-container { max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: white; border: 1px solid #333; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-enviar { background: #00c853; }
        .btn-micro { background: #0288d1; }
        .respuesta { margin-top: 20px; padding: 15px; background: #1e1e1e; border-left: 5px solid #00c853; min-height: 50px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>CodeFix AI 🛠️</h2>
    <p style="color: #aaa; font-size: 14px; margin-top: -10px;">Estación de Diagnóstico de Software Remoto</p>
    <textarea id="mensaje" placeholder="Pega tu código o presiona el micrófono para dictar..."></textarea>
    
    <button class="btn-micro" onclick="activarMicrofono()">🎙️ Activar Micrófono</button>
    <button class="btn-enviar" onclick="enviarMensaje()">Preguntar a la IA</button>

    <div class="respuesta" id="respuestaBox">
        <em>La respuesta de la IA aparecerá aquí...</em>
    </div>
</div>

<script>
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let reconocimiento;

    if (Recognition) {
        reconocimiento = new Recognition();
        reconocimiento.lang = 'es-ES';
        reconocimiento.continuous = false;
        reconocimiento.interimResults = false;

        reconocimiento.onstart = () => {
            document.getElementById('respuestaBox').innerHTML = "<em>🎙️ Escuchando tu voz... Habla ahora.</em>";
        };

        reconocimiento.onresult = (event) => {
            const resultadoTexto = event.results[0][0].transcript;
            document.getElementById('mensaje').value = resultadoTexto;
            document.getElementById('respuestaBox').innerHTML = "<em>✓ Voz convertida a texto con éxito.</em>";
        };

        reconocimiento.onerror = (event) => {
            console.error(event.error);
            document.getElementById('respuestaBox').innerHTML = "<span style='color: #ff5252;'>Error en el micrófono: " + event.error + "</span>";
        };
    }

    function activarMicrofono() {
        if (!reconocimiento) {
            alert("Tu navegador o teléfono no soporta reconocimiento de voz nativo.");
            return;
        }
        reconocimiento.start();
    }

    async function enviarMensaje() {
        const textoArea = document.getElementById('mensaje').value;
        
        if(!textoArea.trim()) {
            alert("Por favor, escribe o dicta un mensaje primero.");
            return;
        }

        const textoAreaArray = textoArea.split('\n');
        let textoNumerado = '';
        for (let i = 0; i < textoAreaArray.length; i++) {
            textoNumerado += (i + 1) + ': ' + textoAreaArray[i] + '\n';
        }
        
        const respuestaBox = document.getElementById('respuestaBox');
        respuestaBox.innerHTML = "<em>Pensando y escaneando líneas...</em>";
        
        try {
            const response = await fetch('https://asistente-backend-8zka.onrender.com/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensaje: textoNumerado })
            });
            
            const data = await response.json();
            respuestaBox.innerText = data.respuesta || "No se recibió respuesta.";
        } catch (error) {
            console.error(error);
            respuestaBox.innerHTML = "<span style='color: #ff5252;'>Error al conectar con el servidor.</span>";
        }
    }
</script>

</body>
</html>
